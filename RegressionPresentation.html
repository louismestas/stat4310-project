## Part II: Finance Application

## Roadmap

- Part I uses two medium-sized datasets with optimal-model workflows.
- Part II uses six NYSE stocks from different industries plus the
  S&amp;P 500 benchmark.
- Every section shows methods, interim process steps, diagnostics,
  extra validation, and final interpretation.

## Part I: Regression Methods


|Step                                 |Method                                                |
|:------------------------------------|:-----------------------------------------------------|
|1. Describe data                     |response, predictors, missingness                     |
|2. Split Train/Test                  |80% / 20%                                             |
|3. Create centered engineered terms  |centered nonlinear terms and interactions             |
|4. Diagnose collinearity             |correlation/VIF diagnostics only; no pre-AIC removals |
|5. Build expanded full model         |lm() with base terms plus all engineered candidates   |
|6. Build CV ladder                   |nested backward models + repeated CV                  |
|7. Compare AIC vs CV                 |AIC-optimal vs CV-optimal                             |
|8. Remove outliers                   |Cook's distance                                       |
|9. Rerun AIC/CV after Cook filtering |post-Cook diagnostics and model selection             |
|10. Check residuals                  |QQ, BP, and DW tests                                  |
|11. Check Box-Cox transformation     |profile likelihood plus original-scale test metrics   |
|12. Bootstrap intervals              |bootstrap coefficient CIs                             |
|13. Predict new cases                |confidence and prediction intervals                   |

class: small-table

## HousePrices: Interim Process


|Step                                              |Detail                                                       |
|:-------------------------------------------------|:------------------------------------------------------------|
|Split data                                        |448 train / 98 test                                          |
|Create centered engineered terms                  |8 derived/interaction candidates                             |
|Diagnose collinearity                             |1 high-correlation pairs flagged; 0 pre-AIC removals         |
|Build centered expanded full model                |19 centered starting predictors                              |
|Build model ladder                                |19 nested steps                                              |
|Run repeated CV                                   |5 folds x 6 repeats                                          |
|Compare AIC and CV                                |Step 6 vs Step 9                                             |
|Remove outliers                                   |34 points above Cook cutoff                                  |
|Rerun diagnostics and AIC/CV after Cook filtering |1 post-Cook high-correlation pairs; Step 6 AIC and Step 6 CV |
|Check residuals                                   |QQ, BP, and DW tests                                         |
|Check Box-Cox transformation                      |profile plot and original-scale test metrics                 |
|Bootstrap intervals                               |200 bootstrap resamples                                      |
|Predict new homes                                 |2 cases with CI and PI                                       |

- The ordering matters: choose the model on training data, check
  influential cases, rerun selection after filtering, then touch the
  held-out test set only once.
- Engineered terms and interactions are created before model selection,
  so AIC/CV can reject them instead of us deciding manually.

## HousePrices: Sensitivity to Cook Filtering

  - We want to know if a few "weird" house sales are ruining our model.
  - Imagine if someone sold a mansion for $1 — that one sale could throw off predictions for every other house. 
  - We use "Cook Filtering" to find and remove those kinds of sales, then check if it helped.


|Training Data Used          |AIC Best Step | AIC RMSE|CV Best Step |  CV RMSE|
|:---------------------------|:-------------|--------:|:------------|--------:|
|Original training data      |Step 6        | 15605.89|Step 9       | 15554.87|
|Cook-filtered training data |Step 6        | 11528.01|Step 6       | 11528.01|

- The upper table asks whether influential sales change model choice or mostly change the size of the validation error.
- We're asking two questions about those weird sales:
    Question 1: Do they change WHICH model we end up choosing?
    Question 2: Do they just make our predictions less accurate?
  This matters because if removing them changes our whole model,
  that's a big deal. If it just improves accuracy, that's less serious.


|Training Data Used          |AIC Best Step |CV Best Step |Held-out Test RMSE             |
|:---------------------------|:-------------|:------------|:------------------------------|
|Original training data      |Step 6        |Step 9       |AIC 15658.57, CV 15586.61      |
|Cook-filtered training data |Step 6        |Step 6       |15561.44 (same for AIC and CV) |

- In the upper table, both RMSE columns are repeated-CV validation RMSE. RMSE = how far off our predictions are on average (lower = better)
- In the lower table, the RMSE is computed on the held-out 20% test set
  by comparing predictions to the actual observed response values.
- When AIC and CV pick the same step, that test RMSE is shown once.
- After Cook filtering, the validation error drops without changing the
  overall selection story.

## HousePrices: Box-Cox Response Check

&lt;img src="RegressionPresentation_files/figure-html/unnamed-chunk-18-1.png" width="100%" style="display: block; margin: auto;" /&gt;


| Best Lambda|Approx. 95% Lambda Interval |Lambda 1 In Interval |Decision                                                                    |
|-----------:|:---------------------------|:--------------------|:---------------------------------------------------------------------------|
|        0.52|[0.33, 0.7]                 |FALSE                |Report as sensitivity evidence; lambda = 1 is outside the profile interval. |

- The profile peaks near lambda 0.52;
  lambda = 1 is outside
  the approximate 95% interval.
- We keep the original-scale model as the main result when interpretability
  and held-out performance are comparable; Box-Cox is the assumption
  sensitivity check.

## HousePrices: Box-Cox Test Metrics


|Dataset     |Model                           | Lambda| Test R2| Test RMSE|Shapiro P |BP P   |
|:-----------|:-------------------------------|------:|-------:|---------:|:---------|:------|

  held-out RMSE and keeps interpretation acceptable.

|str_c:grades          |Interaction |Centered student-teacher-ratio slope allowed to differ by district grade span. |No                  |

- CASchools is the stronger case for socioeconomic nonlinearities because
  poverty, income, and English-learner share overlap in the raw data.
- Retained derived or interaction terms mean those patterns explain
  score variation beyond the original centered main effects.
- Rejected engineered terms are still useful: they show AIC/CV did not
  need every possible curve or district-specific slope.

## CASchools: Box-Cox Response Check

&lt;img src="RegressionPresentation_files/figure-html/unnamed-chunk-40-1.png" width="100%" style="display: block; margin: auto;" /&gt;


| Best Lambda|Approx. 95% Lambda Interval |Lambda 1 In Interval |Decision                                                 |
|-----------:|:---------------------------|:--------------------|:--------------------------------------------------------|
|       -0.32|[-2, 2]                     |TRUE                 |Keep original score scale; lambda = 1 remains plausible. |

- The profile peaks near lambda -0.32;
  lambda = 1 is inside
  the approximate 95% interval.
- Because test score is naturally interpretable, Box-Cox would need clear
  diagnostic and prediction gains before replacing the original response.

## CASchools: Box-Cox Test Metrics


|Dataset   |Model                           | Lambda| Test R2| Test RMSE|Shapiro P |BP P  |
|:---------|:-------------------------------|------:|-------:|---------:|:---------|:-----|
|CASchools |Current final                   |     NA|  0.8190|      8.40|0.374     |0.359 |

|CASchools |Box-Cox smearing back-transform |  -0.32|  0.8190|      8.40|0.420     |0.301 |

- RMSE is still measured in test-score points after back-transforming.

# Part II

## Finance Application

&lt;span class="accent"&gt;6 NYSE stocks, 3 years of close prices, and S&amp;P 500 benchmarking&lt;/span&gt;

---

class: small-table compact

## Finance: Method Steps


|Step                          |Detail                     |
|:-----------------------------|:--------------------------|
|Pull close prices             |Yahoo Finance, 2023-2025   |
|Convert to daily returns      |Arithmetic daily returns   |
|Annualize return and risk     |Mean*252 and sd*sqrt(252)  |
|Compare correlation to market |Corr(stock, SP500)         |
|Plot cumulative returns       |Growth of $1 over time     |
|Run CAPM regressions          |alpha, beta, and R2        |
|Track rolling beta            |60-day beta windows        |
|Track rolling correlation     |60-day correlation windows |

- Returns, not raw prices, are the right object for comparison because
  the stocks trade at very different price levels.
- The finance results answer different questions: average performance,
  market linkage, regression exposure, and time variation.

- Industries are intentionally different to avoid choosing six similar

- The spread of each histogram confirms the annualized risk ordering shown in the return-risk plot.

## Finance: Linking Risk-Return and Market Correlation

&lt;img src="RegressionPresentation_files/figure-html/unnamed-chunk-54-1.png" width="100%" style="display: block; margin: auto;" /&gt;

- Dotted links connect each stock's annual return across the risk view
  and the market-correlation view.
- This makes it easier to compare whether a stock's return profile is
  lining up more with risk or with broad-market linkage.
- A stock can be very market-linked without having the most extreme risk
  position, so correlation and volatility are related but not the same.

## Finance: Correlation Heatmap

&lt;img src="RegressionPresentation_files/figure-html/unnamed-chunk-55-1.png" width="100%" style="display: block; margin: auto;" /&gt;

- Warmer colors mean stronger positive correlation.
- Cooler colors mean weaker market co-movement.
- Correlation matters because diversification is weaker when all assets
  move together.
- The uneven color pattern shows that diversification benefit depends on
  which names are combined, not just how many names are held.

- CAT finishes with the strongest growth path, while
  BA trails the group.
- The path differences show why average return alone can hide very
  different investment experiences.

## Finance: Alpha, Beta, and R-Squared


|Ticker | Alpha Daily| Alpha Annual|   Beta| R Squared|
|:------|-----------:|------------:|------:|---------:|
|JPM    |       5e-04|       0.1261| 0.9257|    0.3628|
|JNJ    |       2e-04|       0.0456| 0.0927|    0.0066|
|XOM    |      -1e-04|      -0.0246| 0.4452|    0.0873|
|WMT    |       8e-04|       0.2083| 0.4618|    0.1221|
|CAT    |       4e-04|       0.0929| 1.1718|    0.3707|
|BA     |      -5e-04|      -0.1280| 1.0558|    0.2277|

- `beta` measures sensitivity to market return.
- `alpha` measures abnormal return relative to the S&amp;P 500.
- `R^2` measures how much of stock-return variation is explained by the
  market.
- CAT is the most market-sensitive name here, and
  CAT is the stock whose returns are most tightly tied
  to broad market movement.

class: plot-slide

## Finance: CAPM Fitted vs Actual Returns

&lt;img src="RegressionPresentation_files/figure-html/unnamed-chunk-58-1.png" width="100%" style="display: block; margin: auto;" /&gt;

- Stocks with higher R-squared cluster more tightly around the diagonal; lower R-squared stocks show wider scatter.
- The spread in each panel is the stock-specific variation the CAPM market factor cannot explain.
- This complements the R-squared column in the CAPM table by making the unexplained residual variation visible.

---

class: plot-slide

## Finance: Rolling 60-Day Beta

&lt;img src="RegressionPresentation_files/figure-html/unnamed-chunk-59-1.png" width="100%" style="display: block; margin: auto;" /&gt;

- Beta above `1` means the stock moved more aggressively than the market
  in that 60-day window.
- Beta blends co-movement with relative volatility, so a rising line can
  mean tighter market linkage, larger stock swings, or both.
- A single full-sample beta misses these shifts, so rolling beta is more
  informative about changing exposure.

---

class: plot-slide

## Finance: Rolling 60-Day Correlation

&lt;img src="RegressionPresentation_files/figure-html/unnamed-chunk-60-1.png" width="100%" style="display: block; margin: auto;" /&gt;

- Correlation isolates co-movement strength only, without the
  relative-volatility piece.
- Together, the rolling beta and rolling correlation plots show whether
  a stock became more market-linked because it moved more in sync with
  the S&amp;P 500, because it got more volatile, or both.
- Comparing the two rolling plots separates “moves with the market” from
  “moves more violently than the market.”

# Final Takeaways

- `HousePrices`: centered derived and interaction candidates enter before
  AIC/CV; the final post-Cook model uses
  Step 6 and keeps
  log_lotsize_c as derived terms plus
  garage_c:lotsize_1000_c as interactions.
- `HousePrices`: VIF is documented but not used as a pre-filter, and
  Box-Cox is treated as
  sensitivity evidence for a transformed response.
- `CASchools`: the final post-Cook model uses
  Step 12, keeps
  None as derived terms and
  low_income_pressure_c as interactions, and
  still points primarily to poverty, income, and district type.
- `CASchools`: Box-Cox is
  not strong enough to replace the original score scale.
- Finance: the six stocks occupy different risk-return positions, show
  different market linkage to the S&amp;P 500, and that linkage changes over
  time in the rolling beta and rolling correlation plots.
