  - generic [ref=e1131]:
    - 'heading "Finance: Rolling 60-Day Beta" [level=2] [ref=e1132]'
    - paragraph [ref=e1133]:
      - img [ref=e1134]
    - list [ref=e1135]:
      - listitem [ref=e1136]:
        - text: Beta above
        - code [ref=e1137]: "1"
        - text: means the stock moved more aggressively than the market in that 60-day window.
      - listitem [ref=e1138]: Beta blends co-movement with relative volatility, so a rising line can mean tighter market linkage, larger stock swings, or both.
      - listitem [ref=e1139]: A single full-sample beta misses these shifts, so rolling beta is more informative about changing exposure.
    - generic [ref=e1140]: 44 / 51
  - generic [ref=e1144]:
    - 'heading "Finance: Rolling 60-Day Correlation" [level=2] [ref=e1145]'
    - paragraph [ref=e1146]:
      - img [ref=e1147]
    - list [ref=e1148]:
      - listitem [ref=e1149]: Correlation isolates co-movement strength only, without the relative-volatility piece.
      - listitem [ref=e1150]: Together, the rolling beta and rolling correlation plots show whether a stock became more market-linked because it moved more in sync with the S&P 500, because it got more volatile, or both.
      - listitem [ref=e1151]: Comparing the two rolling plots separates “moves with the market” from “moves more violently than the market.”
    - generic [ref=e1152]: 45 / 51
